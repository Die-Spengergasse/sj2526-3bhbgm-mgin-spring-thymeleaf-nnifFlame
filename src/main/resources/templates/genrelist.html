<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Genres</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1>Genreverwaltung</h1>
        <p class="lead">Verwalte die Genres für deine Bücher.</p>
    </div>

    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Aktionen</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="g : ${genres}">
            <td th:text="${g.id}"></td>
            <td th:text="${g.name}"></td>
            <td>
                <a th:href="@{'/genre/edit/' + ${g.id}}" class="btn btn-primary btn-xs">Bearbeiten</a>
                <a th:href="@{'/genre/delete/' + ${g.id}}" class="btn btn-danger btn-xs" onclick="return confirm('Sicher löschen?')">Löschen</a>
            </td>
        </tr>
        </tbody>
    </table>

    <p>
        <a href="/genre/add" class="btn btn-success">Neues Genre</a>
        <a href="/book/list" class="btn btn-info">Zur Bücherliste</a>
        <a href="/" class="btn btn-default">Zur Startseite</a>
    </p>
</div>
</body>
</html>
