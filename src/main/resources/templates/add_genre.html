<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title th:text="${genre.id == null ? 'Genre anlegen' : 'Genre bearbeiten'}"></title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1 th:text="${genre.id == null ? 'Neues Genre hinzufügen' : 'Genre bearbeiten'}">Neues Genre</h1>
    <form th:action="@{/genre/add}" th:object="${genre}" method="post">
        <input type="hidden" th:field="*{id}">
        <div class="form-group">
            <label for="name">Name</label>
            <input id="name" type="text" th:field="*{name}" class="form-control" placeholder="Genre Name" required>
        </div>
        <button type="submit" class="btn btn-primary">Speichern</button>
        <a href="/genre/list" class="btn btn-default">Abbrechen</a>
    </form>
</div>
</body>
</html>
